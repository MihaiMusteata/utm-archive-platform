name: CI/CD

# Pornim pipeline-ul la push pe main, la pull request si manual din GitHub UI.
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

# Evitam doua rulari concurente pentru acelasi branch/workflow.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Variabile comune folosite in toate job-urile pentru nume de imagini si namespace.
env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  K8S_NAMESPACE: utm-archive
  API_IMAGE_NAME: archive-api
  CLIENT_IMAGE_NAME: archive-client

jobs:
  # Validam doar backend-ul folosit la deploy. Archive.AppHost nu intra in fluxul de containerizare/GKE.
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore backend dependencies
        run: dotnet restore Archive.API/Archive.API.csproj

      - name: Build backend
        run: dotnet build Archive.API/Archive.API.csproj --configuration Release --no-restore

  # Validam frontend-ul exact cu toolchain-ul folosit si in Dockerfile.
  frontend:
    name: Frontend (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Archive.Client/client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Archive.Client/client/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  # Dupa ce backend-ul si frontend-ul trec, construim si publicam imaginile in Artifact Registry.
  build_and_push:
    name: Build And Push Images
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    needs:
      - backend
      - frontend
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GAR_LOCATION: ${{ vars.GAR_LOCATION }}
      GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
    outputs:
      api_image: ${{ steps.image_vars.outputs.api_image }}
      client_image: ${{ steps.image_vars.outputs.client_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment variables
        shell: bash
        run: |
          set -euo pipefail

          # Verificam daca exista toate variabilele necesare pentru registry si autentificare GCP.
          required_vars=(GCP_PROJECT_ID GAR_LOCATION GAR_REPOSITORY)
          for required_var in "${required_vars[@]}"; do
            if [ -z "${!required_var:-}" ]; then
              echo "::error title=Missing repository variable::${required_var} is required for the deploy pipeline."
              exit 1
            fi
          done

          required_auth_vars=(GCP_WORKLOAD_IDENTITY_PROVIDER GCP_SERVICE_ACCOUNT)
          for required_auth_var in "${required_auth_vars[@]}"; do
            if [ -z "${!required_auth_var:-}" ]; then
              echo "::error title=Missing repository variable::${required_auth_var} is required for Google Cloud authentication."
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GAR_LOCATION}-docker.pkg.dev" --quiet

      - name: Prepare image tags
        id: image_vars
        shell: bash
        run: |
          set -euo pipefail

          # Generam tag-ul versionat cu commit SHA si il expunem ca output pentru job-ul de deploy.
          registry="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}"
          api_image="${registry}/${API_IMAGE_NAME}:${GITHUB_SHA}"
          client_image="${registry}/${CLIENT_IMAGE_NAME}:${GITHUB_SHA}"

          echo "api_image=${api_image}" >> "$GITHUB_OUTPUT"
          echo "client_image=${client_image}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Archive.API/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image_vars.outputs.api_image }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.API_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Archive.Client/client/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VITE_API_BASE_URL=/api
          tags: |
            ${{ steps.image_vars.outputs.client_image }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.CLIENT_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # In ultimul job aplicam manifestele in GKE si actualizam imaginile construite in pasul anterior.
  deploy:
    name: Deploy To GKE
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    needs:
      - build_and_push
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
      GKE_LOCATION: ${{ vars.GKE_LOCATION }}
      ARCHIVE_JWT_ISSUER: ${{ vars.ARCHIVE_JWT_ISSUER }}
      ARCHIVE_JWT_AUDIENCE: ${{ vars.ARCHIVE_JWT_AUDIENCE }}
      ARCHIVE_POSTGRES_DB: ${{ secrets.ARCHIVE_POSTGRES_DB }}
      ARCHIVE_POSTGRES_USER: ${{ secrets.ARCHIVE_POSTGRES_USER }}
      ARCHIVE_POSTGRES_PASSWORD: ${{ secrets.ARCHIVE_POSTGRES_PASSWORD }}
      ARCHIVE_JWT_SIGNING_KEY: ${{ secrets.ARCHIVE_JWT_SIGNING_KEY }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail

          # Blocam deploy-ul daca lipsesc variabilele clusterului sau secretele aplicatiei.
          required_vars=(GCP_PROJECT_ID GKE_CLUSTER GKE_LOCATION)
          for required_var in "${required_vars[@]}"; do
            if [ -z "${!required_var:-}" ]; then
              echo "::error title=Missing repository variable::${required_var} is required for GKE deployment."
              exit 1
            fi
          done

          required_secrets=(ARCHIVE_POSTGRES_DB ARCHIVE_POSTGRES_USER ARCHIVE_POSTGRES_PASSWORD ARCHIVE_JWT_SIGNING_KEY)
          for required_secret in "${required_secrets[@]}"; do
            if [ -z "${!required_secret:-}" ]; then
              echo "::error title=Missing secret::${required_secret} is required for Kubernetes secret creation."
              exit 1
            fi
          done

          required_auth_vars=(GCP_WORKLOAD_IDENTITY_PROVIDER GCP_SERVICE_ACCOUNT)
          for required_auth_var in "${required_auth_vars[@]}"; do
            if [ -z "${!required_auth_var:-}" ]; then
              echo "::error title=Missing repository variable::${required_auth_var} is required for Google Cloud authentication."
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Fetch GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Create or update namespace and secrets
        shell: bash
        run: |
          set -euo pipefail

          # Cream namespace-ul si secretele direct din valorile GitHub, fara a le salva in repo.
          jwt_issuer="${ARCHIVE_JWT_ISSUER:-utm-archive-platform}"
          jwt_audience="${ARCHIVE_JWT_AUDIENCE:-utm-archive-platform}"
          connection_string="Host=archive-db;Port=5432;Database=${ARCHIVE_POSTGRES_DB};Username=${ARCHIVE_POSTGRES_USER};Password=${ARCHIVE_POSTGRES_PASSWORD}"

          kubectl apply -f k8s/namespace.yaml

          kubectl create secret generic archive-db-secret \
            --namespace "${K8S_NAMESPACE}" \
            --from-literal=POSTGRES_DB="${ARCHIVE_POSTGRES_DB}" \
            --from-literal=POSTGRES_USER="${ARCHIVE_POSTGRES_USER}" \
            --from-literal=POSTGRES_PASSWORD="${ARCHIVE_POSTGRES_PASSWORD}" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

          kubectl create secret generic archive-api-secret \
            --namespace "${K8S_NAMESPACE}" \
            --from-literal=ConnectionStrings__Database="${connection_string}" \
            --from-literal=Jwt__Issuer="${jwt_issuer}" \
            --from-literal=Jwt__Audience="${jwt_audience}" \
            --from-literal=Jwt__SigningKey="${ARCHIVE_JWT_SIGNING_KEY}" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Deploy database
        run: kubectl apply -f k8s/db.yaml

      - name: Wait for database rollout
        run: kubectl rollout status statefulset/archive-db --namespace "${K8S_NAMESPACE}" --timeout=300s

      - name: Deploy API
        shell: bash
        run: |
          set -euo pipefail
          # Inlocuim placeholder-ul din manifest cu imaginea API tocmai publicata.
          sed "s|__ARCHIVE_API_IMAGE__|${{ needs.build_and_push.outputs.api_image }}|g" k8s/api.yaml | kubectl apply -f -

      - name: Deploy client
        shell: bash
        run: |
          set -euo pipefail
          # Inlocuim placeholder-ul din manifest cu imaginea frontend-ului pentru versiunea curenta.
          sed "s|__ARCHIVE_CLIENT_IMAGE__|${{ needs.build_and_push.outputs.client_image }}|g" k8s/client.yaml | kubectl apply -f -

      - name: Deploy ingress
        run: kubectl apply -f k8s/ingress.yaml

      - name: Wait for API rollout
        run: kubectl rollout status deployment/archive-api --namespace "${K8S_NAMESPACE}" --timeout=300s

      - name: Wait for client rollout
        run: kubectl rollout status deployment/archive-client --namespace "${K8S_NAMESPACE}" --timeout=300s

      - name: Show deployment summary
        shell: bash
        run: |
          set -euo pipefail
          # Afisam sumarul final pentru debugging rapid dupa rollout.
          kubectl get pods,svc,ingress --namespace "${K8S_NAMESPACE}" -o wide
