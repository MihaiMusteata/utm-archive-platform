apiVersion: v1
kind: Service
metadata:
  name: archive-db-headless
  namespace: utm-archive
  labels:
    app.kubernetes.io/name: archive-db
    app.kubernetes.io/part-of: utm-archive
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: archive-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: archive-db
  namespace: utm-archive
  labels:
    app.kubernetes.io/name: archive-db
    app.kubernetes.io/part-of: utm-archive
spec:
  selector:
    app.kubernetes.io/name: archive-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: archive-db
  namespace: utm-archive
  labels:
    app.kubernetes.io/name: archive-db
    app.kubernetes.io/part-of: utm-archive
spec:
  serviceName: archive-db-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: archive-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: archive-db
        app.kubernetes.io/part-of: utm-archive
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: postgres
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: archive-db-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: archive-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: archive-db-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: db-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
