# ConfigMap-ul pastreaza configuratiile nesensibile ale API-ului.
apiVersion: v1
kind: ConfigMap
metadata:
  name: archive-api-config
  namespace: utm-archive
  labels:
    app.kubernetes.io/name: archive-api
    app.kubernetes.io/part-of: utm-archive
data:
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: http://+:8080
  Storage__RootPath: /data/uploads
---
# PVC-ul ofera spatiu persistent pentru fisierele incarcate de backend.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: archive-api-uploads
  namespace: utm-archive
  labels:
    app.kubernetes.io/name: archive-api
    app.kubernetes.io/part-of: utm-archive
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# Service-ul expune API-ul intern in cluster pe portul 80 si il leaga de pod-urile backend.
apiVersion: v1
kind: Service
metadata:
  name: archive-api
  namespace: utm-archive
  labels:
    app.kubernetes.io/name: archive-api
    app.kubernetes.io/part-of: utm-archive
  annotations:
    cloud.google.com/backend-config: '{"default":"archive-api-backendconfig"}'
spec:
  selector:
    app.kubernetes.io/name: archive-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
# BackendConfig-ul defineste health check-ul folosit de load balancer-ul GKE pentru API.
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: archive-api-backendconfig
  namespace: utm-archive
  labels:
    app.kubernetes.io/name: archive-api
    app.kubernetes.io/part-of: utm-archive
spec:
  healthCheck:
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /health
    port: 8080
---
# Deployment-ul controleaza replica API-ului, injecteaza config/secrets si monteaza volumul persistent.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: archive-api
  namespace: utm-archive
  labels:
    app.kubernetes.io/name: archive-api
    app.kubernetes.io/part-of: utm-archive
spec:
  replicas: 1
  # API-ul foloseste un PVC ReadWriteOnce pentru upload-uri, deci actualizarea trebuie facuta prin inlocuire, nu rolling update paralel.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: archive-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: archive-api
        app.kubernetes.io/part-of: utm-archive
    spec:
      # Init container-ul blocheaza pornirea API-ului pana cand PostgreSQL raspunde in cluster.
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z archive-db 5432; do echo "Waiting for PostgreSQL..."; sleep 2; done
      containers:
        - name: archive-api
          image: __ARCHIVE_API_IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          # ConfigMap-ul si Secret-ul combina configuratia publica cu datele sensibile ale aplicatiei.
          envFrom:
            - configMapRef:
                name: archive-api-config
            - secretRef:
                name: archive-api-secret
          # Probele controleaza cand pod-ul e gata de trafic si cand trebuie repornit daca devine nesanatos.
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 24
          # Requests/limits ajuta scheduler-ul sa aloce resurse predictibil pentru backend.
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          # Upload-urile sunt stocate in volum persistent, nu in filesystem-ul efemer al containerului.
          volumeMounts:
            - name: uploads
              mountPath: /data/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: archive-api-uploads
